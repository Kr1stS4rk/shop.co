<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Описание страницы" />
    <meta name="keywords" content="" />

    <title>SHOP.CO</title>
    <!-- 1. Предзагрузка шрифтов -->
    <!-- 2. Шрифты (подключаем рано, так как они критичны для отображения текста) -->
    <!-- 3. Сброс стилей (reset/normalize) -->
    <link rel="stylesheet" href="asserts/template/css/reset.css" />
    <!-- 5. Основные стили проекта -->
    <link rel="stylesheet" href="asserts/template/css/main.css" />
  </head>
  <body class="app">
    <div class="top-banner" id="topBanner">
      <div class="container top-banner__container">
        <p class="top-banner__text">
          <strong>Sign up and get 20% off to your first order.</strong>
          <a href="#">Sign Up Now</a>
        </p>
        <button class="top-banner__close">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            viewBox="0 0 20 20"
          >
            <path
              fill="#fff"
              d="M16.288 14.962a.939.939 0 1 1-1.328 1.328L10 11.328l-4.962 4.96A.94.94 0 0 1 3.71 14.96L8.672 10l-4.96-4.962A.94.94 0 1 1 5.04 3.71L10 8.672l4.962-4.963a.94.94 0 1 1 1.328 1.328L11.328 10z"
            />
          </svg>
        </button>
      </div>
    </div>
    <header class="header">
      <div class="container header__container">
        <button class="menu__btn">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a href="/" class="logo" aria-label="Homepage">
          <svg >
            <use href="./asserts/template/images/sprite.svg#icon-logo"></use>
          </svg>
        </a>
        <nav class="header__nav">
          <ul class="nav__list" aria-label="Main header">
            <li><a href="" class="nav__link"> Shop</a></li>
            <li>
              <a href="" class="nav__link">On Sale</a>
            </li>
            <li><a href="" class="nav__link">New Arrivals</a></li>
            <li><a href="" class="nav__link">Brands</a></li>
          </ul>
        </nav>
        <form class="search" action="/search" method="get">
          
           
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M21.7959 20.2041 17.3437 15.75a8.636 8.636 0 0 0-1.157-11.7506A8.6361 8.6361 0 0 0 3.9994 16.1867 8.636 8.636 0 0 0 15.75 17.3438l4.4559 4.4568a1.126 1.126 0 0 0 1.2282.2443 1.126 1.126 0 0 0 .6099-.6099 1.128 1.128 0 0 0 0-.8625 1.13 1.13 0 0 0-.2443-.3656zM4.1249 10.5A6.375 6.375 0 1 1 10.5 16.875 6.381 6.381 0 0 1 4.125 10.5"
              />
            </svg>
        

          <input
            type="search"
            class="search__field"
            placeholder="Search for products..."
            id="search-input"
            aria-label="Search for products..."
            name="q"
          />
        </form>
        <div class="header__actions">
            <button
            class="header__action header__action-search icon-size flex items-center justify-center"
            type="button"
            aria-label="Search"
          >
            <svg
            
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M21.7959 20.2041 17.3437 15.75a8.636 8.636 0 0 0-1.157-11.7506A8.6361 8.6361 0 0 0 3.9994 16.1867 8.636 8.636 0 0 0 15.75 17.3438l4.4559 4.4568a1.126 1.126 0 0 0 1.2282.2443 1.126 1.126 0 0 0 .6099-.6099 1.128 1.128 0 0 0 0-.8625 1.13 1.13 0 0 0-.2443-.3656zM4.1249 10.5A6.375 6.375 0 1 1 10.5 16.875 6.381 6.381 0 0 1 4.125 10.5"
              />
            </svg>
          </button>
          <a
            class="header__action header__action-basket icon-size"
            href="/personal/cart/"
            title="Basket"
            data-testid="CartCounter_empty"
          >
            <svg
              class="header__action-svg"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M9.375 20.25a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0m7.875-1.875a1.8752 1.8752 0 0 0-1.839 2.2408 1.8755 1.8755 0 0 0 1.4732 1.4732 1.875 1.875 0 0 0 1.9248-.7973 1.875 1.875 0 0 0-.2332-2.3675 1.875 1.875 0 0 0-1.3258-.5492m4.8253-11.294-2.5584 8.3156a2.614 2.614 0 0 1-2.5097 1.8534H7.7747A2.637 2.637 0 0 1 5.25 15.3459L2.0447 4.125H1.125a1.125 1.125 0 0 1 0-2.25h1.2019a1.8825 1.8825 0 0 1 1.8028 1.3603L4.813 5.625H21a1.125 1.125 0 0 1 1.0753 1.456m-2.5987.794H5.4553l1.9585 6.8531A.375.375 0 0 0 7.7747 15h9.2325a.375.375 0 0 0 .359-.2644z"
              />
            </svg>
          </a>
          <a
            class="header__action header__action-profile icon-size"
            href="/profile"
            title="Profile"
            data-testid="CartCounter_empty"
          >
            <svg
              class="header__action-svg"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 1.875A10.125 10.125 0 1 0 22.125 12 10.1366 10.1366 0 0 0 12 1.875M7.4597 18.4284a5.625 5.625 0 0 1 7.0861-1.6953 5.624 5.624 0 0 1 1.9945 1.6953 7.848 7.848 0 0 1-9.0806 0M9.375 11.25a2.625 2.625 0 1 1 5.2498 0 2.625 2.625 0 0 1-5.2498 0m8.8125 5.6194a7.83 7.83 0 0 0-2.7187-2.1957 4.875 4.875 0 0 0 1.0292-5.305 4.8747 4.8747 0 0 0-7.2-2.178 4.875 4.875 0 0 0-.7667 7.483 7.83 7.83 0 0 0-2.7188 2.1957A7.8751 7.8751 0 0 1 11.9953 4.117a7.875 7.875 0 0 1 7.0861 4.4394 7.875 7.875 0 0 1-.9033 8.313z"
              />
            </svg>
          </a>
        </div>
      </div>
    </header>
    <main>
      <section></section>
    </main>

    <script src="asserts/template/js/main.js"></script>
  </body>
</html>
